<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cape CNG Live</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f4f7;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
}

.card{
background:#fff;
border-radius:20px;
padding:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:5px;
}

.station{
text-align:center;
color:#666;
margin-bottom:20px;
}

.status{
background:#e8fff0;
color:#008a2e;
font-weight:bold;
padding:12px;
border-radius:12px;
text-align:center;
font-size:22px;
margin-bottom:20px;
}

.stock{
text-align:center;
margin-bottom:25px;
}

.stock h2{
font-size:50px;
color:#111;
}

.stock p{
color:#666;
}

.scale-box{
display:flex;
justify-content:center;
margin-bottom:25px;
}

.scale{
width:80px;
height:350px;
border:3px solid #333;
border-radius:15px;
overflow:hidden;
position:relative;
background:#eee;
}

.fill{
position:absolute;
bottom:0;
width:100%;
height:81%;
background:linear-gradient(to top,#00b140,#4cff7d);
}

.scale-labels{
margin-left:15px;
display:flex;
flex-direction:column;
justify-content:space-between;
height:350px;
font-weight:bold;
}

.info{
background:#f7f7f7;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.info p{
margin:6px 0;
}

.location-btn{
display:block;
width:100%;
text-align:center;
background:#007bff;
color:white;
text-decoration:none;
padding:14px;
border-radius:12px;
font-weight:bold;
font-size:18px;
margin-top:10px;
}

.footer{
text-align:center;
margin-top:15px;
color:#777;
font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="logo">⛽</div>

<h1>Cape CNG Live</h1>

<div class="station">
Cape Petroleum Kanyakumari
</div>

<div class="status">
🟢 CNG AVAILABLE
</div>

<div class="stock">
<h2>285 Kg</h2>
<p>Current Stock</p>
<p><b>81% Full</b></p>
</div>

<div class="scale-box">

<div class="scale">
<div class="fill"></div>
</div>

<div class="scale-labels">
<span>350 Kg</span>
<span>280 Kg</span>
<span>175 Kg</span>
<span>70 Kg</span>
<span>0 Kg</span>
</div>

</div>

<div class="info">
<p><b>Tank Capacity:</b> 350 Kg</p>
<p><b>Last Updated:</b> 16 Jun 2026 - 2:15 PM</p>
</div>

<a class="location-btn"
href="https://maps.app.goo.gl/qynyQ2adg7ti2mZM7?g_st=ac"
target="_blank">
📍 View Location
</a>

<div class="footer">
Cape CNG Live © 2026
</div>

</div>

</div>

</body>
</html>
